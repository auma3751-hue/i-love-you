<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รักเค้ามั้ย</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#ffdce7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
}

h1{
    margin-bottom:40px;
    font-size:48px;
    color:#333;
}

.buttons{
    position:relative;
    width:320px;
    height:120px;
    margin:auto;
}

button{
    padding:12px 35px;
    border:none;
    border-radius:30px;
    font-size:22px;
    cursor:pointer;
}

#yes{
    background:#ff4d88;
    color:white;
    position:absolute;
    left:30px;
}

#no{
    background:#666;
    color:white;
    position:absolute;
    right:30px;
}

#result{
    display:none;
    margin-top:40px;
    font-size:32px;
    color:#ff0066;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>รักเค้ามั้ย 💖</h1>

<div class="buttons">
    <button id="yes">รัก</button>
    <button id="no">ไม่</button>
</div>

<div id="result">
🥰 เค้าก็รักเธอเหมือนกัน คิดถึงสุดๆ อยากกอด อยากหอม อยากจุ้บ รักน้าา💕
</div>

</div>

<script>
const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");
const result=document.getElementById("result");

noBtn.addEventListener("mouseover",()=>{

const x=Math.random()*(window.innerWidth-100);
const y=Math.random()*(window.innerHeight-60);

noBtn.style.position="fixed";
noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

yesBtn.addEventListener("click",()=>{

document.querySelector(".buttons").style.display="none";
result.style.display="block";

});
</script>

</body>
</html>
